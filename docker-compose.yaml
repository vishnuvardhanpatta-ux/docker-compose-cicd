version: "3.9"

services:

  web:
    build: .
    container_name: flask_app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: mysql_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: demo_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: